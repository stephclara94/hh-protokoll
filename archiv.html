<html lang="de">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HH Archiv">

<title>Helfende Hände – Archiv</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green:       #00843D;
  --green-light: #E8F0EC;
  --green-muted: #A8C8B8;
  --gray-dark:   #3C3C3C;
  --gray-med:    #5C5C5C;
  --gray-light:  #F0F0F0;
  --white:       #FFFFFF;
  --red:         #CC0000;
  --amber:       #E07B00;
  --border:      #C8DDD4;
  --font: 'Segoe UI', Arial, sans-serif;
}
body { font-family: var(--font); font-size: 14px; color: var(--gray-dark); background: #F5F7F6; }
.page-wrap { max-width: 1060px; margin: 0 auto; padding: 24px 20px 60px; }

/* ── HEADER ── */
.doc-header {
  background: #fff; padding: 14px 20px 12px; margin: -24px -20px 0;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 3px solid var(--green); margin-bottom: 20px;
}
.doc-header .brand { display: flex; align-items: center; gap: 16px; }
.doc-header .brand-text { display: flex; flex-direction: column; justify-content: center; }
.doc-header .brand-name { font-size: 22px; font-weight: 700; color: var(--green); letter-spacing: .2px; line-height: 1.2; }
.doc-header .brand-sub { font-size: 12px; color: var(--gray-med); margin-top: 3px; }
.doc-header .header-right { display: flex; align-items: center; gap: 12px; }
.doc-header .badge { background: var(--red); color: #fff; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 3px; letter-spacing: 1.2px; }

/* ── TOOLBAR ── */
.toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.toolbar span { font-size: 13px; color: var(--gray-med); margin-left: auto; }
.btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer;
  font-size: 13px; font-weight: 600; font-family: var(--font); transition: opacity .15s; }
.btn:hover { opacity: .85; }
.btn-primary   { background: var(--green); color: #fff; }
.btn-secondary { background: var(--green-light); color: var(--green); border: 1px solid var(--green-muted); }
.btn-danger    { background: #fde8e8; color: var(--red); border: 1px solid #f5b8b8; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* ── STATS ── */
.stats-bar { display: flex; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; }
.stat-card { background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 14px 18px; flex: 1; min-width: 140px; }
.stat-card .stat-value { font-size: 26px; font-weight: 700; color: var(--green); }
.stat-card .stat-label { font-size: 12px; color: var(--gray-med); margin-top: 2px; }

/* ── CONTROLS ── */
.controls { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
.controls input, .controls select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px;
  font-family: var(--font); font-size: 13px; background: #FAFCFB; }
.controls input { flex: 1; min-width: 200px; }
.controls select { min-width: 160px; }

/* ── TABS ── */
.archiv-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--green); }
.archiv-tab { padding: 8px 20px; cursor: pointer; font-size: 13px; font-weight: 600;
  background: var(--green-light); color: var(--gray-med); border: 1px solid var(--border);
  border-bottom: none; border-radius: 4px 4px 0 0; margin-bottom: -2px; }
.archiv-tab.active { background: var(--green); color: #fff; border-color: var(--green); }
.archiv-tab:not(.active):hover { background: var(--green-light); color: var(--green); }

/* ── ACCORDION MONTH ── */
.month-card { background: #fff; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 12px; overflow: hidden; }
.month-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px;
  cursor: pointer; user-select: none; transition: background .15s; }
.month-header:hover { background: var(--green-light); }
.month-header .left { display: flex; align-items: center; gap: 10px; }
.month-header .arrow { font-size: 14px; color: var(--gray-med); transition: transform .2s; }
.month-header .arrow.open { transform: rotate(90deg); }
.month-header .month-title { font-size: 14px; font-weight: 700; color: var(--green); }
.month-header .month-meta { font-size: 12px; color: var(--gray-med); }
.month-header .month-count { font-size: 11px; background: var(--green-light); color: var(--green);
  padding: 2px 10px; border-radius: 12px; font-weight: 600; }
.month-header .actions { display: flex; gap: 6px; align-items: center; }
.month-body { display: none; padding: 0 18px 16px; }
.month-body.open { display: block; }

/* ── TABLES ── */
table.arch-table { width: 100%; border-collapse: collapse; font-size: 13px; }
table.arch-table th { background: var(--green); color: #fff; padding: 8px 10px; text-align: left; font-weight: 600; font-size: 12px; }
table.arch-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
table.arch-table tr:nth-child(even) td { background: #FAFCFB; }
table.arch-table td input, table.arch-table td textarea {
  width: 100%; border: 1px solid var(--border); border-radius: 3px; padding: 4px 7px;
  font-family: var(--font); font-size: 12px; background: #FAFCFB; }
table.arch-table td textarea { resize: vertical; min-height: 36px; }

.STATUS_BG_OFFEN    { background: #FFF3CD !important; }
.STATUS_BG_ERLEDIGT { background: #D4EDDA !important; }
.STATUS_BG_VERZÖGERT { background: #FDECEA !important; }
.STATUS_BG_ENTFÄLLT  { background: #EBEBEB !important; }

.empty-msg { color: var(--gray-med); font-size: 13px; padding: 16px 0; text-align: center; }

/* ── EDIT OVERLAY ── */
.edit-overlay { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,.4);
  align-items: center; justify-content: center; }
.edit-overlay.open { display: flex; }
.edit-panel { background: #fff; border-radius: 8px; padding: 28px; max-width: 600px; width: 95%;
  max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 30px rgba(0,0,0,.15); }
.edit-panel h3 { color: var(--green); margin-bottom: 16px; font-size: 16px; }
.edit-field { margin-bottom: 12px; }
.edit-field label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-med); margin-bottom: 4px; }
.edit-field input, .edit-field textarea, .edit-field select {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
  font-family: var(--font); font-size: 13px; }
.edit-field textarea { resize: vertical; min-height: 60px; }
.edit-actions { display: flex; gap: 10px; margin-top: 16px; }

/* ── LOGIN ANIMATION ── */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.login-card { animation: fadeInUp .4s ease-out; }

/* ── MOBILE ── */
@media (max-width: 640px) {
  .page-wrap { padding: 16px 12px 40px; overflow-x: hidden; }
  .doc-header { flex-direction: column; gap: 8px; align-items: flex-start; padding: 12px 14px; margin: -16px -12px 0; }
  .doc-header .brand-name { font-size: 17px; }
  .doc-header .header-right { width: 100%; justify-content: space-between; }
  .stats-bar { gap: 8px; }
  .stat-card { min-width: 0; padding: 10px 12px; overflow: hidden; }
  .stat-card .stat-value { font-size: 20px; }
  .stat-card .stat-label { font-size: 10px; word-break: break-word; hyphens: auto; }
  .toolbar { margin-top: 6px; }
  .controls { flex-direction: column; }
  .controls input, .controls select { width: 100%; min-width: 0; box-sizing: border-box; }
  .archiv-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .archiv-tab { padding: 8px 14px; font-size: 12px; white-space: nowrap; }
  .month-header { flex-direction: column; gap: 8px; align-items: flex-start; padding: 12px 14px; }
  .month-header .actions { width: 100%; justify-content: flex-end; }
  table.arch-table { font-size: 11px; min-width: 500px; }
  .month-body { padding: 0 10px 12px; overflow-x: auto; }
  .toolbar { gap: 6px; }
  .toolbar .btn { padding: 6px 10px; font-size: 12px; }
  .edit-panel { padding: 20px 16px; width: 100%; max-width: none; margin: 0 8px; box-sizing: border-box; }
  .edit-field input, .edit-field textarea, .edit-field select { box-sizing: border-box; max-width: 100%; }
  .edit-field input[type="date"] { height: auto; padding: 8px 10px; -webkit-appearance: none; }
}

/* ── PRINT ── */
@media print {
  @page { size: A4 portrait; margin: 12mm; }
  body { background: #fff; font-size: 9pt; }
  .toolbar, .controls, .btn, .actions, .stats-bar, .archiv-tabs, .edit-overlay { display: none !important; }
  .month-body { display: block !important; }
  .month-header .arrow { display: none; }
  .page-wrap { max-width: 100%; padding: 0; }
}
</style>
</head>

    <h2 style="font-size:20px;font-weight:700;color:#00843D;margin-bottom:4px;">Helfende Hände Group</h2>
    <p style="font-size:13px;color:#5C5C5C;margin-bottom:20px;">Bitte anmelden, um fortzufahren.</p>
    <input id="user-input" type="email" placeholder="E-Mail-Adresse"
      style="width:100%;padding:10px 14px;border:1px solid #C8DDD4;border-radius:4px;font-size:14px;font-family:inherit;margin-bottom:12px;text-align:center;"
      onkeydown="if(event.key==='Enter')document.getElementById('pw-input').focus()">
    <input id="pw-input" type="password" placeholder="Passwort"
      style="width:100%;padding:10px 14px;border:1px solid #C8DDD4;border-radius:4px;font-size:14px;font-family:inherit;margin-bottom:12px;text-align:center;"
      onkeydown="if(event.key==='Enter')document.getElementById('pw-btn').click()">
    <button id="pw-btn" onclick="checkPw()"
      style="width:100%;padding:10px;background:#00843D;color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;">Anmelden</button>
    <p id="pw-error" style="color:#CC0000;font-size:12px;margin-top:10px;display:none;"></p>
  </div>
</div>
<script>
var allowedUsers=['stephan.clara@helfende-haende.de','karl.pfeifer@helfende-haende.de'];
function checkPw(){
  var email=document.getElementById('user-input').value.trim().toLowerCase();
  var errEl=document.getElementById('pw-error');
  if(!allowedUsers.includes(email)){
    errEl.textContent='Unbekannte E-Mail-Adresse.';
    errEl.style.display='block';
    document.getElementById('user-input').focus();
    return;
  }
  var h='o~mmF0*o~ptf\x7f*u~es~p';var k=7;var p='';
  for(var i=0;i<h.length;i++)p+=String.fromCharCode(h.charCodeAt(i)^k);
  if(document.getElementById('pw-input').value===p){
    document.getElementById('pw-overlay').style.display='none';
    sessionStorage.setItem('hh-auth','1');
    sessionStorage.setItem('hh-user',email);
  } else {
    errEl.textContent='Falsches Passwort.';
    errEl.style.display='block';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}
if(sessionStorage.getItem('hh-auth')==='1'){
  document.getElementById('pw-overlay').style.display='none';
}
</script>

<script>
// ── SUPABASE ──
const SUPABASE_URL = 'https://fkbusafoleeayzhfdtuk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrYnVzYWZvbGVlYXl6aGZkdHVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzMzNTIsImV4cCI6MjA5MDEwOTM1Mn0.st7rTMSUmXVPYLeiRcgJ5FdaVKH2ci3iRecS_w6xHqM';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let state = { archiv: [] };

// ── HELPERS ──
function escH(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
const PRIO_ICONS = { 'Hoch': '🔴', 'Mittel': '🟡', 'Niedrig': '🟢' };
const STATUS_BG = { 'OFFEN': 'STATUS_BG_OFFEN', 'ERLEDIGT': 'STATUS_BG_ERLEDIGT', 'VERZÖGERT': 'STATUS_BG_VERZÖGERT', 'ENTFÄLLT': 'STATUS_BG_ENTFÄLLT' };

// ── LOAD DATA ──
async function loadData() {
  const { data, error } = await sb.from('protokoll').select('data').eq('id', 'current').single();
  if (error) {
    document.getElementById('status-msg').textContent = 'Fehler beim Laden: ' + error.message;
    // fallback localStorage
    const ls = localStorage.getItem('hh-protokoll');
    if (ls) state = JSON.parse(ls);
    return;
  }
  if (data && data.data) state = data.data;
  document.getElementById('status-msg').textContent = 'Geladen';
  renderArchiv();
  renderStats();
}

async function saveState() {
  localStorage.setItem('hh-protokoll', JSON.stringify(state));
  const { error } = await sb.from('protokoll').update({ data: state }).eq('id', 'current');
  if (error) {
    document.getElementById('status-msg').textContent = 'Speicherfehler: ' + error.message;
  } else {
    document.getElementById('status-msg').textContent = 'Gespeichert – ' + new Date().toLocaleTimeString('de-DE');
  }
}

// ── STATS ──
function renderStats() {
  const archiv = state.archiv || [];
  const totalMonths = archiv.length;
  const totalAgenda = archiv.reduce((s, m) => s + (m.agenda || []).length, 0);
  const totalBeschl = archiv.reduce((s, m) => s + (m.beschluesse || []).length, 0);
  const totalTasks = archiv.reduce((s, m) => s + (m.tasks || []).length, 0);
  const doneTasks = archiv.reduce((s, m) => s + (m.tasks || []).filter(t => t.status === 'ERLEDIGT').length, 0);
  const doneRate = totalTasks > 0 ? Math.round(doneTasks / totalTasks * 100) : 0;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="stat-value">${totalMonths}</div><div class="stat-label">📅 Archivierte Monate</div></div>
    <div class="stat-card"><div class="stat-value">${totalAgenda}</div><div class="stat-label">📋 Agenda-Punkte</div></div>
    <div class="stat-card"><div class="stat-value">${totalBeschl}</div><div class="stat-label">📝 Beschlüsse</div></div>
    <div class="stat-card"><div class="stat-value">${totalTasks}</div><div class="stat-label">📊 Aufgaben gesamt</div></div>
    <div class="stat-card"><div class="stat-value">${doneRate}%</div><div class="stat-label">✅ Erledigungsquote</div></div>
  `;
}

// ── RENDER ARCHIV ──
function renderArchiv() {
  const archiv = state.archiv || [];
  const search = (document.getElementById('search').value || '').toLowerCase();
  const monthF = document.getElementById('month-filter').value;
  const tabF = document.getElementById('tab-filter').value;
  const statusF = document.getElementById('status-filter').value;
  const body = document.getElementById('archiv-body');

  // Show/hide status filter
  document.getElementById('status-filter').style.display = (tabF === 'tasks' || tabF === 'all') ? '' : 'none';

  // Rebuild month filter
  const monthSel = document.getElementById('month-filter');
  const curVal = monthSel.value;
  monthSel.innerHTML = '<option value="">Alle Monate</option>';
  archiv.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.date; opt.textContent = m.label;
    if (m.date === curVal) opt.selected = true;
    monthSel.appendChild(opt);
  });

  if (archiv.length === 0) {
    body.innerHTML = '<div class="empty-msg">Noch kein Archiv vorhanden. Starte einen neuen Monat im Protokoll, um Einträge zu archivieren.</div>';
    return;
  }

  const filtered = monthF ? archiv.filter(m => m.date === monthF) : archiv;
  let html = '';

  filtered.forEach((month, mIdx) => {
    const realIdx = archiv.indexOf(month);
    const agendaCount = (month.agenda || []).length;
    const beschlCount = (month.beschluesse || []).length;
    const taskCount = (month.tasks || []).length;

    // Check if any items match the search in this month
    const agendaItems = (month.agenda || []).filter(a => !search ||
      a.thema.toLowerCase().includes(search) || (a.ent || '').toLowerCase().includes(search) || (a.ver || '').toLowerCase().includes(search));
    const beschlItems = (month.beschluesse || []).filter(b => !search || (b.text || '').toLowerCase().includes(search));
    let taskItems = (month.tasks || []).filter(t => (!search || (t.desc || '').toLowerCase().includes(search) ||
      (t.person || '').toLowerCase().includes(search)) && (!statusF || t.status === statusF));

    const hasResults = (tabF === 'all' || tabF === 'agenda') && agendaItems.length > 0 ||
                       (tabF === 'all' || tabF === 'beschluesse') && beschlItems.length > 0 ||
                       (tabF === 'all' || tabF === 'tasks') && taskItems.length > 0;
    if (search && !hasResults) return;

    html += `<div class="month-card" id="month-${realIdx}">`;
    html += `<div class="month-header" onclick="toggleMonth(${realIdx})">
      <div class="left">
        <span class="arrow" id="arrow-${realIdx}">▶</span>
        <span class="month-title">📅 ${escH(month.label)}</span>
        <span class="month-meta">${month.teilnehmer ? escH(month.teilnehmer) : ''}</span>
        <span class="month-count">${agendaCount} Agenda &middot; ${beschlCount} Beschlüsse &middot; ${taskCount} Aufgaben</span>
      </div>
      <div class="actions">
        <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();exportMonthPDF(${realIdx})" title="Als PDF drucken">🖨</button>
        <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();editMonth(${realIdx})" title="Bearbeiten">✏️</button>
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteMonth(${realIdx})" title="Löschen">🗑</button>
      </div>
    </div>`;
    html += `<div class="month-body" id="body-${realIdx}">`;

    // Agenda
    if (tabF === 'all' || tabF === 'agenda') {
      if (agendaItems.length > 0) {
        html += `<h4 style="font-size:13px;color:var(--green);margin:12px 0 8px;">Agenda (${agendaItems.length})</h4>`;
        html += '<table class="arch-table"><thead><tr><th style="width:4%">#</th><th>Thema</th><th style="width:28%">Entscheidung</th><th style="width:16%">Verantwortlich</th></tr></thead><tbody>';
        agendaItems.forEach((a, i) => {
          html += `<tr><td style="text-align:center;font-weight:700;color:var(--green)">${i + 1}</td>
            <td>${escH(a.thema)}</td><td>${escH(a.ent || '—')}</td><td>${escH(a.ver || '—')}</td></tr>`;
        });
        html += '</tbody></table>';
      }
    }

    // Beschlüsse
    if (tabF === 'all' || tabF === 'beschluesse') {
      if (beschlItems.length > 0) {
        html += `<h4 style="font-size:13px;color:var(--green);margin:12px 0 8px;">Beschlüsse (${beschlItems.length})</h4>`;
        html += '<table class="arch-table"><thead><tr><th style="width:4%">#</th><th>Beschluss</th><th style="width:16%">Abstimmung</th></tr></thead><tbody>';
        beschlItems.forEach((b, i) => {
          html += `<tr><td style="text-align:center;font-weight:700;color:var(--green)">${i + 1}</td>
            <td>${escH(b.text || '—')}</td><td>${escH(b.abstimmung || '—')}</td></tr>`;
        });
        html += '</tbody></table>';
      }
    }

    // Tasks
    if (tabF === 'all' || tabF === 'tasks') {
      if (taskItems.length > 0) {
        html += `<h4 style="font-size:13px;color:var(--green);margin:12px 0 8px;">Aufgaben (${taskItems.length})</h4>`;
        html += '<table class="arch-table"><thead><tr><th style="width:4%">#</th><th style="width:6%">Prio</th><th>Aufgabe</th><th style="width:14%">Verantwortlich</th><th style="width:10%">Fällig</th><th style="width:10%">Erledigt</th><th style="width:10%">Status</th></tr></thead><tbody>';
        taskItems.forEach((t, i) => {
          html += `<tr class="${STATUS_BG[t.status] || ''}">
            <td style="text-align:center;font-weight:700;color:var(--green)">${i + 1}</td>
            <td>${PRIO_ICONS[t.prio] || ''} ${escH(t.prio || '')}</td>
            <td>${escH(t.desc || '')}</td>
            <td>${escH(t.person || '—')}</td>
            <td>${t.due || '—'}</td>
            <td>${t.done || '—'}</td>
            <td><strong>${escH(t.status || '')}</strong></td></tr>`;
        });
        html += '</tbody></table>';
      }
    }

    html += '</div></div>';
  });

  body.innerHTML = html || '<div class="empty-msg">Keine Ergebnisse für diese Suche.</div>';
}

// ── ACCORDION ──
function toggleMonth(idx) {
  const body = document.getElementById('body-' + idx);
  const arrow = document.getElementById('arrow-' + idx);
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

// ── DELETE MONTH ──
function deleteMonth(idx) {
  const month = state.archiv[idx];
  if (!month) return;
  if (!confirm('Archiv-Eintrag "' + month.label + '" wirklich löschen?\n\nDieser Vorgang kann nicht rückgängig gemacht werden.')) return;
  state.archiv.splice(idx, 1);
  saveState();
  renderArchiv();
  renderStats();
}

// ── EDIT MONTH ──
let editingIdx = -1;
function editMonth(idx) {
  editingIdx = idx;
  const month = state.archiv[idx];
  if (!month) return;

  const panel = document.getElementById('edit-panel');
  let html = `<h3>✏️ ${escH(month.label)} bearbeiten</h3>`;

  // Agenda
  html += '<h4 style="margin:16px 0 8px;color:var(--green);font-size:13px;">Agenda-Punkte</h4>';
  (month.agenda || []).forEach((a, i) => {
    html += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr 30px;gap:6px;margin-bottom:6px;align-items:start;">
      <div class="edit-field"><input value="${escH(a.thema)}" onchange="updateAgenda(${i},'thema',this.value)" placeholder="Thema"></div>
      <div class="edit-field"><input value="${escH(a.ent || '')}" onchange="updateAgenda(${i},'ent',this.value)" placeholder="Entscheidung"></div>
      <div class="edit-field"><input value="${escH(a.ver || '')}" onchange="updateAgenda(${i},'ver',this.value)" placeholder="Verantwortlich"></div>
      <button class="btn btn-sm btn-danger" onclick="removeAgenda(${i})" style="margin-top:0;">✕</button>
    </div>`;
  });
  html += `<button class="btn btn-sm btn-secondary" onclick="addAgenda()" style="margin-top:4px;">+ Agenda-Punkt</button>`;

  // Beschlüsse
  html += '<h4 style="margin:16px 0 8px;color:var(--green);font-size:13px;">Beschlüsse</h4>';
  (month.beschluesse || []).forEach((b, i) => {
    html += `<div style="display:grid;grid-template-columns:1fr 140px 30px;gap:6px;margin-bottom:6px;align-items:start;">
      <div class="edit-field"><textarea onchange="updateBeschluss(${i},'text',this.value)">${escH(b.text || '')}</textarea></div>
      <div class="edit-field"><select onchange="updateBeschluss(${i},'abstimmung',this.value)">
        <option ${(b.abstimmung || '') === 'Einstimmig' ? 'selected' : ''}>Einstimmig</option>
        <option ${b.abstimmung === 'Mehrheit' ? 'selected' : ''}>Mehrheit</option>
        <option ${b.abstimmung === 'Abgelehnt' ? 'selected' : ''}>Abgelehnt</option>
      </select></div>
      <button class="btn btn-sm btn-danger" onclick="removeBeschluss(${i})" style="margin-top:0;">✕</button>
    </div>`;
  });
  html += `<button class="btn btn-sm btn-secondary" onclick="addBeschluss()" style="margin-top:4px;">+ Beschluss</button>`;

  // Tasks
  html += '<h4 style="margin:16px 0 8px;color:var(--green);font-size:13px;">Aufgaben</h4>';
  (month.tasks || []).forEach((t, i) => {
    html += `<div style="display:grid;grid-template-columns:1fr 100px 90px 30px;gap:6px;margin-bottom:6px;align-items:start;">
      <div class="edit-field"><input value="${escH(t.desc || '')}" onchange="updateTask(${i},'desc',this.value)" placeholder="Aufgabe"></div>
      <div class="edit-field"><input value="${escH(t.person || '')}" onchange="updateTask(${i},'person',this.value)" placeholder="Verantwortlich"></div>
      <div class="edit-field"><select onchange="updateTask(${i},'status',this.value)">
        <option ${t.status === 'OFFEN' ? 'selected' : ''}>OFFEN</option>
        <option ${t.status === 'ERLEDIGT' ? 'selected' : ''}>ERLEDIGT</option>
        <option ${t.status === 'VERZÖGERT' ? 'selected' : ''}>VERZÖGERT</option>
        <option ${t.status === 'ENTFÄLLT' ? 'selected' : ''}>ENTFÄLLT</option>
      </select></div>
      <button class="btn btn-sm btn-danger" onclick="removeTask(${i})" style="margin-top:0;">✕</button>
    </div>`;
  });
  html += `<button class="btn btn-sm btn-secondary" onclick="addTask()" style="margin-top:4px;">+ Aufgabe</button>`;

  html += `<div class="edit-actions">
    <button class="btn btn-primary" onclick="closeEdit()">Fertig</button>
    <button class="btn btn-secondary" onclick="closeEdit()">Schließen</button>
  </div>`;

  panel.innerHTML = html;
  document.getElementById('edit-overlay').classList.add('open');
}

function closeEdit() {
  document.getElementById('edit-overlay').classList.remove('open');
  saveState();
  renderArchiv();
  renderStats();
  editingIdx = -1;
}

// Edit helpers
function updateAgenda(i, field, val) { state.archiv[editingIdx].agenda[i][field] = val; }
function updateBeschluss(i, field, val) { state.archiv[editingIdx].beschluesse[i][field] = val; }
function updateTask(i, field, val) { state.archiv[editingIdx].tasks[i][field] = val; }
function removeAgenda(i) { state.archiv[editingIdx].agenda.splice(i, 1); editMonth(editingIdx); }
function removeBeschluss(i) { state.archiv[editingIdx].beschluesse.splice(i, 1); editMonth(editingIdx); }
function removeTask(i) { state.archiv[editingIdx].tasks.splice(i, 1); editMonth(editingIdx); }
function addAgenda() { state.archiv[editingIdx].agenda = state.archiv[editingIdx].agenda || []; state.archiv[editingIdx].agenda.push({ thema: '', ent: '', ver: '' }); editMonth(editingIdx); }
function addBeschluss() { state.archiv[editingIdx].beschluesse = state.archiv[editingIdx].beschluesse || []; state.archiv[editingIdx].beschluesse.push({ text: '', abstimmung: 'Einstimmig' }); editMonth(editingIdx); }
function addTask() { state.archiv[editingIdx].tasks = state.archiv[editingIdx].tasks || []; state.archiv[editingIdx].tasks.push({ desc: '', person: '', prio: 'Mittel', status: 'OFFEN', due: '', done: '' }); editMonth(editingIdx); }

// ── PDF EXPORT ──
function exportMonthPDF(idx) {
  const month = state.archiv[idx];
  if (!month) return;
  // Open all, print, then close
  const allBodies = document.querySelectorAll('.month-body');
  const allArrows = document.querySelectorAll('.arrow');
  const prevStates = [];

  allBodies.forEach((b, i) => {
    prevStates.push({ open: b.classList.contains('open') });
    b.classList.remove('open');
  });
  allArrows.forEach(a => a.classList.remove('open'));

  // Open only the target month
  const targetBody = document.getElementById('body-' + idx);
  const targetArrow = document.getElementById('arrow-' + idx);
  if (targetBody) targetBody.classList.add('open');
  if (targetArrow) targetArrow.classList.add('open');

  document.title = 'Protokoll – ' + month.label;
  window.print();
  document.title = 'Helfende Hände – Archiv';

  // Restore
  allBodies.forEach((b, i) => {
    if (prevStates[i] && prevStates[i].open) b.classList.add('open');
  });
}

function printMonth() {
  // Open all months for full print
  document.querySelectorAll('.month-body').forEach(b => b.classList.add('open'));
  document.querySelectorAll('.arrow').forEach(a => a.classList.add('open'));
  window.print();
}

// Close edit overlay on outside click
document.getElementById('edit-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeEdit();
});

// ── INIT ──
loadData();
</script>
</body>
</html>
